name: metal_strength
description: "Metal Strength — know your strength level from what you lift."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Renders the non-human vector exercise illustrations in assets/images.
  flutter_svg: ^2.0.10
  # Lightweight state management for the calculator flow.
  provider: ^6.1.2
  # Persists the user's profile + unit preference between launches.
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/catalog/exercises.json
    - assets/images/
